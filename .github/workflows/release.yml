name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux CPU
            os: ubuntu-latest
            artifact_name: release-linux-cpu
          - name: macOS
            os: macos-14
            artifact_name: release-macos

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build release bundle
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build
          just --shell bash --shell-arg -lc release-bundle "${GITHUB_REF_NAME}" dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  build_linux_cuda:
    name: Build Linux CUDA
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build CUDA release bundle
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-cuda
          just --shell bash --shell-arg -lc release-bundle-cuda "${GITHUB_REF_NAME}" dist

      - name: Upload CUDA release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-cuda
          path: dist/*
          if-no-files-found: error

  build_linux_amd:
    name: Build Linux AMD ROCm
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build AMD ROCm release bundle
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-amd
          just --shell bash --shell-arg -lc release-bundle-amd "${GITHUB_REF_NAME}" dist

      - name: Upload AMD ROCm release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-rocm
          path: dist/*
          if-no-files-found: error

  build_linux_vulkan:
    name: Build Linux Vulkan
    runs-on: ubuntu-latest

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libvulkan-dev \
            glslc \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build Vulkan release bundle
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan
          just --shell bash --shell-arg -lc release-bundle-vulkan "${GITHUB_REF_NAME}" dist

      - name: Upload Vulkan release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-vulkan
          path: dist/*
          if-no-files-found: error

  build_windows:
    name: Build Windows ${{ matrix.name }}
    runs-on: windows-2022
    env:
      ROCM_HIP_SDK_FILENAME: AMD-Software-PRO-Edition-25.Q3-WinSvr2022-For-HIP.exe
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPU
            build_recipe: release-build
            bundle_recipe: release-bundle
            artifact_name: release-windows-cpu
          - name: CUDA
            build_recipe: release-build-cuda
            bundle_recipe: release-bundle-cuda
            artifact_name: release-windows-cuda
          - name: ROCm
            build_recipe: release-build-amd
            bundle_recipe: release-bundle-amd
            artifact_name: release-windows-rocm
          - name: Vulkan
            build_recipe: release-build-vulkan
            bundle_recipe: release-bundle-vulkan
            artifact_name: release-windows-vulkan

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mesh-llm/ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install backend SDK
        shell: pwsh
        run: |
          switch ('${{ matrix.name }}') {
            'CUDA' {
              choco install cuda -y --no-progress
              $cudaRoot = $env:CUDA_PATH
              if (-not $cudaRoot -or -not (Test-Path $cudaRoot)) {
                $cudaRoot = Get-ChildItem "$env:ProgramFiles\NVIDIA GPU Computing Toolkit\CUDA" -Directory -ErrorAction SilentlyContinue |
                  Sort-Object Name -Descending |
                  Select-Object -ExpandProperty FullName -First 1
              }
              if (-not $cudaRoot) {
                throw 'CUDA toolkit install completed, but CUDA_PATH was not found.'
              }
              "$cudaRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              "CUDA_PATH=$cudaRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            'ROCm' {
              $downloadPage = "https://www.amd.com/en/developer/resources/rocm-hub/eula/licenses.html?filename=$env:ROCM_HIP_SDK_FILENAME"
              $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
              $page = Invoke-WebRequest -Uri $downloadPage -WebSession $session
              $formStart = [regex]::Match($page.Content, 'name=":formstart" value="([^"]+)"').Groups[1].Value
              if (-not $formStart) {
                throw 'Failed to extract AMD HIP SDK form metadata.'
              }

              $installer = Join-Path $env:RUNNER_TEMP $env:ROCM_HIP_SDK_FILENAME
              $body = @{
                ':formstart' = $formStart
                '_charset_' = 'utf-8'
                ':redirect' = '/en/developer/resources/rocm-hub/eula/licenses.html'
                'filename' = $env:ROCM_HIP_SDK_FILENAME
              }

              Invoke-WebRequest `
                -Uri 'https://www.amd.com/en/developer/resources/rocm-hub/eula/licenses.html' `
                -WebSession $session `
                -Method Post `
                -Body $body `
                -OutFile $installer `
                -MaximumRedirection 5

              $installLog = Join-Path $env:RUNNER_TEMP 'hip-sdk-install.log'
              Start-Process $installer -ArgumentList '-install', '-log', $installLog -NoNewWindow -Wait

              $rocmRoot = @(
                (Join-Path $env:ProgramFiles 'AMD\ROCm'),
                (Join-Path $env:ProgramFiles 'AMD\HIP')
              ) | Where-Object { Test-Path $_ } | Select-Object -First 1

              if (-not $rocmRoot) {
                throw "HIP SDK install completed, but ROCM_PATH was not found. See $installLog"
              }

              "$rocmRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              "$rocmRoot\llvm\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              "ROCM_PATH=$rocmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "HIP_PATH=$rocmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            'Vulkan' {
              choco install vulkan-sdk -y --no-progress
              $sdk = Get-ChildItem 'C:\VulkanSDK' -Directory -ErrorAction SilentlyContinue |
                Sort-Object Name -Descending |
                Select-Object -First 1
              if (-not $sdk) {
                throw 'Vulkan SDK install completed, but no C:\VulkanSDK directory was found.'
              }
              "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              "$($sdk.FullName)\Bin32" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            default {
            }
          }

      - name: Build Windows release bundle
        shell: pwsh
        run: |
          just ${{ matrix.build_recipe }}
          just ${{ matrix.bundle_recipe }} "${env:GITHUB_REF_NAME}" dist

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
      - build_linux_cuda
      - build_linux_amd
      - build_linux_vulkan
      - build_windows

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
